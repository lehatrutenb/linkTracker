app:
  scrapper:
    api-path: ${wiremock.server.baseUrl}
    paths:
      addChat: /tg-chat/{id}
      deleteChat: /tg-chat/{id}
      listLinks: /links
      trackLink: /links
      untrackLink: /links
  telegram:
    link:
      tracker:
        url: ${wiremock.server.baseUrl}/bot/
        init-state-try-set-fixed-rate: 1s
        token: test-token
        update-listener-sleep: 1s
        debug: true
        update-notifier-before-retry: 1s
