spring:
  application:
    name: scrapper
  liquibase:
    change-log: classpath:scrapper-migrations/master.xml
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

app:
  data:
    access-type: "ORM" # IN_MEM ORM SQL
  telegram:
    link:
      tracker:
        api-path: http://127.0.0.1:8080
        paths:
          updates: /updates
  snowflake:
    worker-id: 1
    datacenter-id: 1
  global:
    scrapping-fixed-rate: 100
    max-description-length: 200
  stackoverflow:
    key: test-token
    access-token: test-token
    api-root: ${wiremock.server.baseUrl}/stack-overflow-api/
  github:
    token: test-token
    user-agent: github-events-scrapping-service
    api-root: ${wiremock.server.baseUrl}/github-api/

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg %kvp%n"
