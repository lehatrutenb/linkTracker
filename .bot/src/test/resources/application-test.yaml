spring:
  liquibase:
    change-log: classpath:/migrations/master.xml
app:
  scrapper:
    api-path: http://127.0.0.1:8081
    paths:
      addChat: /tg-chat/{id}
      deleteChat: /tg-chat/{id}
      listLinks: /links
      trackLink: /links
      untrackLink: /links
  data:
    access-type: "SQL" # IN_MEM ORM SQL
  telegram:
    link:
      tracker:
        url: ${wiremock.server.baseUrl}/bot/
        init-state-try-set-fixed-rate: 1s
        token: test-token
        update-listener-sleep: 1s
        debug: true
        update-notifier-before-retry: 1s
